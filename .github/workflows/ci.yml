name: Backend CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clothiq
          MYSQL_USER: clothiq
          MYSQL_PASSWORD: clothiq_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQLHOST: 127.0.0.1
      MYSQLPORT: 3306
      MYSQLDATABASE: clothiq
      MYSQLUSER: clothiq
      MYSQLPASSWORD: clothiq_password
      SECRET_KEY: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo4NzY1NDMyMTA=
      GOOGLE_CLIENT_ID: dummy-google-client-id
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret
      BASE_API_URL: http://localhost:8080
      BASE_FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Run Maven verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
